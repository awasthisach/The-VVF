name: Android CI/CD Release Candidate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build, Audit, and Package Release Candidate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Restore Gradle Wrapper Jar
      run: |
        echo "Restoring official, uncorrupted Gradle Wrapper JAR..."
        mkdir -p gradle/wrapper
        curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Copy Env Configuration
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          echo "Initialized .env configuration from template."
        else
          touch .env
          echo "Created placeholder .env file."
        fi

    - name: Grant Gradle Execution Permission
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Run Android Lint
      run: |
        if [ -f gradlew ]; then
          ./gradlew lintDebug --no-daemon
        else
          gradle lintDebug --no-daemon
        fi

    - name: Run Unit and Robolectric Tests
      run: |
        if [ -f gradlew ]; then
          ./gradlew testDebugUnitTest --no-daemon
        else
          gradle testDebugUnitTest --no-daemon
        fi

    - name: Assemble Debug and Unsigned Release APKs
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug assembleRelease --no-daemon
        else
          gradle assembleDebug assembleRelease --no-daemon
        fi

    - name: Package Release Android App Bundle (AAB)
      run: |
        if [ -f gradlew ]; then
          ./gradlew bundleRelease --no-daemon
        else
          gradle bundleRelease --no-daemon
        fi

    - name: Upload Build Artifacts (APKs)
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 14

    - name: Upload Build Artifacts (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: android-aab
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 14

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: app/build/reports/lint-results-debug.*
        retention-days: 14
