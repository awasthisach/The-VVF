name: VVF Android Production Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ FIX: Node 24 (no deprecation warning)
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ✅ Java 17 (Android stable requirement)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      # ✅ Gradle cache (CRITICAL performance fix)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ✅ Make Gradle executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # ✅ Clean build (IMPORTANT for CI stability)
      - name: Clean project
        run: ./gradlew clean

      # ✅ Run tests (fail fast)
      - name: Run tests
        run: ./gradlew test

      # ✅ Debug APK build
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ✅ Release APK build (signed if keys exist)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ✅ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vvf-smart-file-manager-apk
          path: app/build/outputs/apk/**/*.apk

      # Optional: GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
