name: Android CI/CD Pipeline
# Refreshed Gradle Wrapper step to resolve binary corruption error

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    outputs:
      has_sign_keys: ${{ steps.check_credentials.outputs.has_sign_keys }}
    env:
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
      KEYSTORE_PATH: ${{ github.workspace }}/release.jks

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for auto-changelog and versioning

    - name: Restore Gradle Wrapper Jar
      run: |
        echo "Restoring official, uncorrupted Gradle Wrapper JAR..."
        mkdir -p gradle/wrapper
        curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Copy Env Configuration
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          echo "Initialized .env configuration from template."
        else
          touch .env
          echo "Created placeholder .env file."
        fi

    - name: Check for Signing Credentials
      id: check_credentials
      run: |
        if [ ! -z "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ] && [ ! -z "${{ secrets.STORE_PASSWORD }}" ] && [ ! -z "${{ secrets.KEY_PASSWORD }}" ]; then
          echo "HAS_SIGN_KEYS=true" >> $GITHUB_ENV
          echo "has_sign_keys=true" >> $GITHUB_OUTPUT
          echo "Signing credentials successfully detected."
        else
          echo "HAS_SIGN_KEYS=false" >> $GITHUB_ENV
          echo "has_sign_keys=false" >> $GITHUB_OUTPUT
          echo "No signing secrets detected. Falling back to debug builds for safety."
        fi

    - name: Decrypt Release Keystore File
      if: env.HAS_SIGN_KEYS == 'true'
      run: |
        echo "Restoring sign credentials from secrets..."
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks
        echo "KEYSTORE_PATH=${{ github.workspace }}/release.jks" >> $GITHUB_ENV

    - name: Grant Gradle Execution Permission
      run: |
        # In case the wrapper exists or was pushed, ensure it has correct execution permissions.
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Run Android Lint Audit
      run: |
        if [ -f gradlew ]; then
          ./gradlew lintDebug --no-daemon
        else
          gradle lintDebug --no-daemon
        fi

    - name: Run Unit & Robolectric Tests
      run: |
        if [ -f gradlew ]; then
          ./gradlew testDebugUnitTest --no-daemon
        else
          gradle testDebugUnitTest --no-daemon
        fi

    - name: Compile Debug Launcher Package (CI Artifact)
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Compile Release Launcher Package (CD Artifact)
      if: env.HAS_SIGN_KEYS == 'true'
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleRelease bundleRelease --no-daemon
        else
          gradle assembleRelease bundleRelease --no-daemon
        fi

    - name: Upload Debug APK Deliverable
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Release Artifacts
      if: env.HAS_SIGN_KEYS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-packages
        path: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/bundle/release/app-release.aab
        retention-days: 14

  deploy-github-release:
    name: Publish Release to GitHub
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download Debug Artifact
      uses: actions/download-artifact@v4
      with:
        name: app-debug-apk
        path: build-outputs/

    - name: Download Release Artifacts (If Available)
      if: needs.build-and-test.outputs.has_sign_keys == 'true'
      uses: actions/download-artifact@v4
      with:
        name: app-release-packages
        path: build-outputs/

    - name: Set Release Parameters
      id: release_params
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Smart Files - Release ${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "TAG_NAME=latest-dev" >> $GITHUB_ENV
          echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Smart Files - Continuous Development Build" >> $GITHUB_ENV
        fi

    - name: Publish Action Release Note
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_TITLE }}
        prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        files: |
          build-outputs/**/*.apk
          build-outputs/**/*.aab
        fail_on_unmatched_files: false
        body_path: .github/workflows/release_notes.md
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
